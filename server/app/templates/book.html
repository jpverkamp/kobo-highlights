{% extends "base.html" %} {% block content %}
<div class="breadcrumb">
  <a href="/books">Books</a>
</div>
<div class="page-header">
  <h1>{{ book['title'] }}</h1>
</div>
<div class="card-grid">
  {% for chapter in chapters %}
  <a
    class="card"
    href="/books/{{ book['slug'] }}/chapter/{{ chapter['slug'] }}"
  >
    <h2>{{ chapter['title'] }}</h2>
    <p>{{ chapter['highlight_count'] }} highlights</p>
  </a>
  {% else %}
  <p>No chapters found for this book.</p>
  {% endfor %}
</div>
{% endblock %}
